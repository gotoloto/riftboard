<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Riftbound staples — top commons, uncommons, rares</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="staples.css" />
</head>
<body>
  <header>
    <div class="header-row">
      <h1>Top staples</h1>
      <a class="back-link" href="./">← Main dashboard</a>
    </div>
    <p id="meta" class="muted"></p>
    <p id="sheet-status" class="muted sheet-status"></p>
    <p class="muted note">
      Sorted by total appearances across every cached legend's tournament decks.
      Runes and battlefields excluded. Each card shows the legends that run it in
      more than 50% of their decks, with that legend's inclusion rate.
      <strong>Missing</strong> assumes a 3-of playset (max(0, 3 − Owned)).
    </p>
    <label class="enroute-toggle">
      <input type="checkbox" id="include-enroute" />
      Include en-route cards as owned
      <span id="enroute-info" class="muted"></span>
    </label>
    <label class="enroute-toggle">
      <input type="checkbox" id="hide-complete" />
      Hide cards where Missing = 0
    </label>
    <span id="lock-toggles" class="lock-toggles"></span>
  </header>

  <main id="rarities"></main>

  <img id="card-thumb" alt="" hidden />
  <script src="utils.js?v=20"></script>
  <script src="cards-catalog.js"></script>
  <script src="collection-owned.js"></script>
  <script src="collection-enroute.js"></script>
  <script src="collection-sheet.js"></script>
  <script src="staples.js"></script>
  <script src="staples-app.js"></script>
</body>
</html>
